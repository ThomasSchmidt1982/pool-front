<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaManager — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand fw-bold"><i class="bi bi-droplet-fill me-2"></i>AquaManager</span>
    <div class="d-flex align-items-center gap-3 ms-auto me-3">
        <i class="bi bi-person-circle fs-4 text-white-50"></i>
        <div class="lh-sm">
            <div id="user-name" class="text-white fw-semibold small">—</div>
            <div id="user-role" class="text-white-50" style="font-size: 0.75rem;"></div>
        </div>
    </div>
    <button id="btn-logout" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
    </button>
</nav>

<!-- Contenu -->
<div class="container py-5">
    <h4 class="mb-4 text-secondary">Statut de la piscine</h4>

    <div class="row g-4">

        <!-- Capacité max -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-4">
                <i class="bi bi-people-fill fs-1 text-primary mb-2"></i>
                <div class="fs-2 fw-bold" id="max-capacity">—</div>
                <div class="text-muted">Capacité maximum</div>
            </div>
        </div>

        <!-- Occupation actuelle -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-4">
                <i class="bi bi-person-fill fs-1 text-warning mb-2"></i>
                <div class="fs-2 fw-bold" id="occupancy">—</div>
                <div class="text-muted">Personnes présentes</div>
            </div>
        </div>

        <!-- Places disponibles -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-4">
                <i class="bi bi-check-circle-fill fs-1 text-success mb-2"></i>
                <div class="fs-2 fw-bold" id="current-capacity">—</div>
                <div class="text-muted">Places disponibles</div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/dashboard.js"></script>
</body>
</html>
