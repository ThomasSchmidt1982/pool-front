<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" media="print">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" media="print">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <!-- Open Graph pour LinkedIn -->
    <meta property="og:title" content="AquaManager — Gestion des entrées/sorties de piscine municipale">
    <meta property="og:description" content="Application full stack ( avec une API et un Frontend) de gestion de piscine : accès, tickets, capacité en temps réel.">
    <meta property="og:image" content="https://pool-front.onrender.com/docs/preview.png">
    <meta property="og:url" content="https://pool-front.onrender.com">
    <meta property="og:type" content="website">
    <title>Connexion | AquaManager</title>
</head>


<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand fw-bold"><i class="bi bi-droplet-fill me-2"></i>AquaManager</span>
</nav>

<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
        <!-- fomrulaire login -->
        <h4 class="mb-4 text-center">Connexion</h4>
        <div id="login-error" class="alert alert-danger d-none"></div>
        <div class="mb-3">
            <label for="input-email" class="form-label">Email</label>
            <input name="email" autocomplete="email" type="email" id="input-email" class="form-control"/>
        </div>
        <div class="mb-3">
            <label for="input-password" class="form-label">Mot de passe</label>
            <input name="password" autocomplete="current-password" type="password" id="input-password" class="form-control"/>
        </div>
        <button id="btn-login" class="btn btn-primary w-100">Se connecter</button>
        <div class="d-flex justify-content-between mt-3">
            <a href="#" class="text-muted small">Mot de passe oublié ?</a>
            <a id="btn-show-register" href="#" class="small">Créer un compte</a>
        </div>

        <!-- formulaire inscription -->
        <div id="register-form" class="collapse m-3 border-top pt-3">
            <h6 class="mb-3">Créer un compte</h6>
            <div id="register-error" class="alert alert-danger d-none"></div>
            <div id="register-success" class="alert alert-success d-none"></div>
            <div class="mb-2">
                <label for="reg-firstname" class="form-label">Prénom</label>
                <input name="firstname" type="text" id="reg-firstname" class="form-control" placeholder="Prénom"/>
            </div>
            <div class="mb-2">
                <label for="reg-lastname" class="form-label">Nom</label>
                <input name="lastname" type="text" id="reg-lastname" class="form-control" placeholder="Nom"/>
            </div>
            <div class="mb-2">
                <label for="reg-email" class="form-label">Email</label>
                <input name="reg-email" autocomplete="email" type="email" id="reg-email" class="form-control" placeholder="Email"/>
            </div>
            <div class="mb-2">
                <label for="reg-password" class="form-label">Mot de passe</label>
                <input name="reg-password" type="password" id="reg-password" class="form-control"
                       placeholder="Mot de passe (8 caractères min)"/>
            </div>
            <button id="btn-register" class="btn btn-success w-100">Créer mon compte</button>
        </div>

    </div>
</div>

<script type=module src="js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
