<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Connexion | AquaManager</title>
</head>


<body>
<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand fw-bold"><i class="bi bi-droplet-fill me-2"></i>AquaManager</span>
</nav>
<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
        <h4 class="mb-4 text-center">Connexion</h4>
        <div id="login-error" class="alert alert-danger d-none"></div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="input-email" class="form-control" />
        </div>
        <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <input type="password" id="input-password" class="form-control" />
        </div>
        <button id="btn-login" class="btn btn-primary w-100">Se connecter</button>
    </div>
</div>

<script type=module src="js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
